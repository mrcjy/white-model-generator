<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tiles 白膜生成器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1d23;
      color: #dde1ea;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #21252e;
      border-bottom: 1px solid #2e333f;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e8ecf3;
      letter-spacing: 0.3px;
    }
    header .badge {
      font-size: 11px;
      background: #3a7bd5;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px 24px 16px;
      gap: 16px;
    }

    .form-section {
      background: #21252e;
      border: 1px solid #2e333f;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .form-row.inline {
      grid-template-columns: 110px 1fr 110px 1fr;
    }

    label {
      font-size: 13px;
      color: #9aa3b2;
      white-space: nowrap;
    }

    .path-display {
      background: #161921;
      border: 1px solid #2e333f;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 13px;
      color: #c5cad6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
      min-height: 32px;
      line-height: 20px;
    }
    .path-display.placeholder { color: #4a5060; }

    select, input[type="number"] {
      background: #161921;
      border: 1px solid #2e333f;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 13px;
      color: #c5cad6;
      outline: none;
      min-height: 32px;
      width: 100%;
    }
    select:focus, input[type="number"]:focus {
      border-color: #3a7bd5;
    }
    select option { background: #21252e; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      padding: 6px 14px;
      min-height: 32px;
      white-space: nowrap;
    }
    .btn-secondary {
      background: #2e3440;
      color: #c5cad6;
      border: 1px solid #3a3f4d;
    }
    .btn-secondary:hover { background: #363c4a; }

    .btn-primary {
      background: #3a7bd5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 28px;
      border-radius: 6px;
      width: 100%;
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #2f68c0; }
    .btn-primary:disabled {
      background: #2a3244;
      color: #555f75;
      cursor: not-allowed;
    }

    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #21252e;
      border: 1px solid #2e333f;
      border-radius: 8px;
    }
    .log-header {
      padding: 8px 14px;
      font-size: 12px;
      color: #6b7486;
      border-bottom: 1px solid #2e333f;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-header button {
      background: none;
      border: none;
      color: #6b7486;
      font-size: 11px;
      padding: 2px 6px;
      cursor: pointer;
    }
    .log-header button:hover { color: #9aa3b2; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #9aa3b2;
    }
    #log .log-info  { color: #9aa3b2; }
    #log .log-ok    { color: #4ec9a0; }
    #log .log-warn  { color: #e5c07b; }
    #log .log-err   { color: #e06c75; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 4px;
    }
    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid #2e3440;
      border-top-color: #3a7bd5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-text { font-size: 12px; color: #6b7486; }

    /* ── 进度条 ── */
    #progress-section {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .prog-track {
      width: 100%;
      height: 6px;
      background: #2e333f;
      border-radius: 3px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      width: 0%;
      background: #3a7bd5;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    /* 不确定模式：来回扫描 */
    .prog-fill.indeterminate {
      width: 30% !important;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .prog-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7486;
    }
    .prog-stats span { white-space: nowrap; }
    .prog-eta { color: #9aa3b2; }
  </style>
</head>
<body>
  <header>
    <h1>3D Tiles 白膜生成器</h1>
    <span class="badge">LOD 多级</span>
  </header>

  <div class="main">
    <div class="form-section">
      <!-- SHP 文件 -->
      <div class="form-row">
        <label>建筑轮廓 SHP</label>
        <div class="path-display placeholder" id="shp-path">未选择文件…</div>
        <button class="btn-secondary" id="btn-shp">选择文件</button>
      </div>

      <!-- 高度属性 -->
      <div class="form-row">
        <label>高度属性字段</label>
        <select id="height-field" disabled>
          <option value="">── 请先选择 SHP 文件 ──</option>
        </select>
        <div></div>
      </div>

      <!-- 输出目录 -->
      <div class="form-row">
        <label>输出目录</label>
        <div class="path-display placeholder" id="out-path">未选择目录…</div>
        <button class="btn-secondary" id="btn-out">选择目录</button>
      </div>

      <!-- 高级参数 -->
      <div class="form-row inline">
        <label>默认高度 (m)</label>
        <input type="number" id="default-height" value="10" min="1" max="9999" step="1" />
        <label style="text-align:right; padding-right:6px">海拔偏移 (m)</label>
        <input type="number" id="elevation-offset" value="15" min="0" max="9999" step="1" />
      </div>
    </div>

    <!-- 状态 + 进度条 + 生成按钮 -->
    <div id="status-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">就绪</span>
    </div>
    <div id="progress-section">
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <div class="prog-stats">
        <span id="prog-tiles">0 tiles</span>
        <span id="prog-rate"></span>
        <span id="prog-elapsed">00:00</span>
        <span class="prog-eta" id="prog-eta"></span>
      </div>
    </div>
    <button class="btn-primary" id="btn-generate" disabled>生成 3D Tiles</button>

    <!-- 日志 -->
    <div class="log-section">
      <div class="log-header">
        <span>运行日志</span>
        <button id="btn-clear">清空</button>
      </div>
      <div id="log"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
